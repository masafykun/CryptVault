name: CryptVault
options:
  bundleIdPrefix: com.masafy
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true
packages:
  RcloneCryptKit:
    url: https://github.com/masafykun/RcloneCryptKit.git
    from: 0.1.0
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm.git
    exactVersion: 3.6.0
targets:
  CryptVault:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: RcloneCryptKit
        product: RcloneCryptKit
      - package: VLCKitSPM
        product: VLCKitSPM
    info:
      path: CryptVault-Info.plist
      properties:
        CFBundleDisplayName: CryptVault
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: バックアップの閲覧をロック解除するために Face ID を使用します
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.masafy.cryptvault
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
  CryptVaultMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: RcloneCryptKit
        product: RcloneCryptKit
      - package: VLCKitSPM
        product: VLCKitSPM
    info:
      path: CryptVaultMac-Info.plist
      properties:
        CFBundleDisplayName: CryptVault
        LSMinimumSystemVersion: "13.0"
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.masafy.cryptvault.mac
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        # Personal local tool: no App Sandbox (simplifies network + VLC plugin loading).
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
