name: CryptVault
options:
  bundleIdPrefix: com.masafy
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true
packages:
  RcloneCryptKit:
    url: https://github.com/masafykun/RcloneCryptKit.git
    from: 0.2.0
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm.git
    exactVersion: 3.6.0
targets:
  CryptVault:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: RcloneCryptKit
        product: RcloneCryptKit
      - package: VLCKitSPM
        product: VLCKitSPM
    info:
      path: CryptVault-Info.plist
      properties:
        CFBundleDisplayName: CryptVault
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: Vault のロック解除に Face ID を使用します
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.masafy.cryptvault
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
  CryptVaultMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: RcloneCryptKit
        product: RcloneCryptKit
      - package: VLCKitSPM
        product: VLCKitSPM
    info:
      path: CryptVaultMac-Info.plist
      properties:
        CFBundleDisplayName: CryptVault
        LSMinimumSystemVersion: "13.0"
        LSApplicationCategoryType: public.app-category.utilities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.masafy.cryptvault.mac
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        # Mac App Store requires the App Sandbox (entitlements below). Hardened Runtime is left
        # off so VLCKit's plugin bundles load without a library-validation exception.
        CODE_SIGN_ENTITLEMENTS: CryptVaultMac.entitlements
        COMBINE_HIDPI_IMAGES: YES
